version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://whisper:whisper123@db:5432/whispertask
      - SECRET_KEY=${SECRET_KEY:-supersecret-change-me}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - FINE_TUNED_MODEL_PATH=${FINE_TUNED_MODEL_PATH:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whisper
      POSTGRES_PASSWORD: whisper123
      POSTGRES_DB: whispertask
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisper"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
